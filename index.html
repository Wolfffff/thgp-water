<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turkana Water Quality Map</title>

  <!-- Fonts — preconnect + load non-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap">

  <!-- Preload GeoJSON data so fetches start before JS parses -->
  <link rel="preload" href="./data/sites.geojson" as="fetch" crossorigin>
  <link rel="preload" href="./data/turkana-boundary.geojson" as="fetch" crossorigin>
  <link rel="preload" href="./data/turkana-wards.geojson" as="fetch" crossorigin>
  <link rel="preload" href="./data/kenya-boundary.geojson" as="fetch" crossorigin>
</head>
<body>
  <div id="map"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
