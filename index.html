<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive map analyzing 152 water sources across Turkana County, Kenya for 48 physical-chemical parameters against WHO and Kenya drinking water thresholds.">
  <meta name="theme-color" content="#111111">

  <!-- Open Graph -->
  <meta property="og:title" content="Turkana Water Quality Map">
  <meta property="og:description" content="Interactive map of drinking-water risk across 152 sampling sites in Turkana County, Kenya.">
  <meta property="og:type" content="website">

  <title>Turkana Water Quality Map</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">

  <!-- Fonts — preconnect + load non-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700&display=swap">

  <!-- Preload GeoJSON data so fetches start before JS parses -->
  <link rel="preload" href="./data/sites.geojson" as="fetch" crossorigin>
  <link rel="preload" href="./data/turkana-boundary.geojson" as="fetch" crossorigin>
  <link rel="preload" href="./data/turkana-wards.geojson" as="fetch" crossorigin>
  <link rel="preload" href="./data/kenya-boundary.geojson" as="fetch" crossorigin>
</head>
<body>
  <div id="map" role="application" aria-label="Turkana water quality interactive map"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
